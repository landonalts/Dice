<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dice Roller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>3D Dice Roller</h1>
        
        <div class="dice-scene">
            <div class="dice-wrapper" id="wrapper1">
                <div class="dice" id="dice1">
                    <div class="face front"><span class="pip"></span></div>
                    <div class="face back"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                    <div class="face right"><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                    <div class="face left"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                    <div class="face top"><span class="pip"></span><span class="pip"></span></div>
                    <div class="face bottom"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                </div>
            </div>

            <div class="dice-wrapper" id="wrapper2">
                <div class="dice" id="dice2">
                    <div class="face front"><span class="pip"></span></div>
                    <div class="face back"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                    <div class="face right"><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                    <div class="face left"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                    <div class="face top"><span class="pip"></span><span class="pip"></span></div>
                    <div class="face bottom"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="roll-btn">Roll Dice</button>
            <h2 id="result">Result: 2</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
